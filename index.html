<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Control - Silos</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #020617;
    color: #e2e8f0;
}

/* 🔝 HEADER */
.header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 2px solid #1e293b;
    letter-spacing: 1px;
}

/* 📊 GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 25px;
    padding: 20px;
}

/* 🧱 TARJETA */
.silo {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

/* 🏷️ TITULO SILO */
.silo h3 {
    margin: 5px;
    font-size: 16px;
}

/* 🛢️ TANQUE */
.tanque {
    width: 70px;
    height: 180px;
    margin: 15px auto;
    border: 2px solid #334155;
    border-radius: 10px;
    position: relative;
    background: #020617;
    overflow: hidden;
}

/* 🔥 NIVEL (LLENA DESDE ABAJO) */
.nivel {
    width: 100%;
    position: absolute;
    bottom: 0;
    height: 0%;
    background: red;
    transition: all 0.5s ease;
}

/* 🔢 VALOR */
.valor {
    font-size: 20px;
    font-weight: bold;
}

.unidad {
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
    NIVELES DE SILOS
</div>

<div class="container">

    <div class="silo">
        <h3>SILO A</h3>
        <div class="tanque">
            <div class="nivel" id="n1"></div>
        </div>
        <div class="valor" id="v1">0</div>
        <div class="unidad">toneladas</div>
    </div>

    <div class="silo">
        <h3>SILO B</h3>
        <div class="tanque">
            <div class="nivel" id="n2"></div>
        </div>
        <div class="valor" id="v2">0</div>
        <div class="unidad">toneladas</div>
    </div>

    <div class="silo">
        <h3>SILO C</h3>
        <div class="tanque">
            <div class="nivel" id="n3"></div>
        </div>
        <div class="valor" id="v3">0</div>
        <div class="unidad">toneladas</div>
    </div>

    <div class="silo">
        <h3>SILO D</h3>
        <div class="tanque">
            <div class="nivel" id="n4"></div>
        </div>
        <div class="valor" id="v4">0</div>
        <div class="unidad">toneladas</div>
    </div>

</div>

<script>

// 🔌 MQTT
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

client.on("connect", () => {
    console.log("✅ Conectado");

    client.subscribe("silos/esp32/reading1");
    client.subscribe("silos/esp32/reading2");
    client.subscribe("silos/esp32/reading3");
    client.subscribe("silos/esp32/reading4");
});

client.on("message", (topic, message) => {
    let valor = parseFloat(message.toString());
    actualizar(topic, valor);
});

// 🎯 ACTUALIZAR TANQUE
function actualizar(topic, valor) {

    let maxTon = 100; // 🔧 AJUSTAR A TU SILO REAL

    let porcentaje = (valor / maxTon) * 100;

    let id = "";
    let vid = "";

    if (topic === "silos/esp32/reading1") { id="n1"; vid="v1"; }
    if (topic === "silos/esp32/reading2") { id="n2"; vid="v2"; }
    if (topic === "silos/esp32/reading3") { id="n3"; vid="v3"; }
    if (topic === "silos/esp32/reading4") { id="n4"; vid="v4"; }

    // 🎨 COLORES INDUSTRIALES
    let color = "#22c55e"; // verde

    if (valor < 40) color = "#facc15"; // amarillo
    if (valor < 20) color = "#ef4444"; // rojo

    // 📊 NIVEL DESDE ABAJO
    const nivel = document.getElementById(id);
    nivel.style.height = porcentaje + "%";
    nivel.style.background = color;

    // 🔢 TEXTO
    document.getElementById(vid).innerText = Math.round(valor);

    // 🔴 PARPADEO CRÍTICO
    if (valor < 20) {
        nivel.style.animation = "blink 1s infinite";
    } else {
        nivel.style.animation = "none";
    }
}

// 🔴 ANIMACIÓN
const style = document.createElement('style');
style.innerHTML = `
@keyframes blink {
    50% { opacity: 0.3; }
}`;
document.head.appendChild(style);

</script>

</body>
</html>
