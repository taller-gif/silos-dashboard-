<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silo HUD - Interface Zero</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --bg: #02040a;
            --accent: #00f0ff;
            --safe: #00ff9d;
            --warning: #ffcc00;
            --danger: #ff0055;
            --panel-bg: rgba(10, 20, 30, 0.4);
        }

        body {
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; /* Rejilla de fondo futurista */
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 8px;
            margin: 0;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- EL SILO FUTURISTA --- */
        .silo-container {
            position: relative;
            background: var(--panel-bg);
            border-left: 4px solid rgba(0, 240, 255, 0.1);
            padding: 30px;
            border-radius: 0 20px 0 20px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0.4; /* Apagado por defecto */
            filter: grayscale(0.8) blur(1px);
            cursor: pointer;
        }

        .silo-container:hover {
            opacity: 1;
            filter: grayscale(0) blur(0px);
            background: rgba(0, 240, 255, 0.05);
            border-left-color: var(--accent);
            box-shadow: -10px 0 30px rgba(0, 240, 255, 0.1);
            transform: scale(1.02);
        }

        /* Marcador de nivel (Anillo) */
        .gauge-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .scan-ring {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 2px solid transparent;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 3s linear infinite;
            opacity: 0;
            transition: 0.5s;
        }

        .silo-container:hover .scan-ring { opacity: 0.5; }

        .main-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--safe) 0deg, rgba(255,255,255,0.05) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            mask-image: radial-gradient(transparent 65%, black 66%);
            -webkit-mask-image: radial-gradient(transparent 65%, black 66%);
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .data-display {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .val-num { font-size: 48px; font-weight: 700; font-family: 'Orbitron'; line-height: 1; }
        .val-unit { font-size: 14px; letter-spacing: 2px; opacity: 0.7; }

        .silo-info {
            margin-top: 25px;
            text-transform: uppercase;
        }

        .silo-info h3 { margin: 0; font-size: 22px; letter-spacing: 4px; color: var(--accent); }
        
        /* Botones que aparecen progresivamente */
        .btn-history {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 25px;
            font-family: 'Orbitron';
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.4s ease;
        }

        .silo-container:hover .btn-history {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-history:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }

        /* --- MODAL Y OTROS --- */
        .modal {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center;
        }
        .modal-content { width: 80%; max-width: 900px; background: #0a0f1a; padding: 40px; border: 1px solid var(--accent); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Estado Crítico */
        .critical-glow {
            animation: danger-pulse 1s infinite alternate;
        }
        @keyframes danger-pulse {
            from { box-shadow: inset 0 0 10px var(--danger); }
            to { box-shadow: inset 0 0 40px var(--danger); border-color: var(--danger); }
        }
    </style>
</head>
<body>

<header>
    <h1>SYSTEM CORE: SILO MONITOR</h1>
</header>

<div class="grid" id="mainGrid">
    </div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--accent)">DATA LOG</h2>
        <canvas id="historyChart"></canvas>
        <button class="btn-history" onclick="closeModal()" style="opacity:1; transform:none; margin-top:30px;">CLOSE ENCRYPTED CHANNEL</button>
    </div>
</div>

<script>
    const CONFIG = {
        "silos/esp32/reading1": { name: "SILO ALPHA", max: 75, data: [] },
        "silos/esp32/reading2": { name: "SILO BETA", max: 45, data: [] },
        "silos/esp32/reading3": { name: "SILO GAMMA", max: 75, data: [] },
        "silos/esp32/reading4": { name: "SILO DELTA", max: 45, data: [] }
    };

    const grid = document.getElementById('mainGrid');
    let chartInstance = null;

    // Generar Silos dinámicamente
    Object.keys(CONFIG).forEach((topic, i) => {
        const s = CONFIG[topic];
        const div = document.createElement('div');
        div.className = 'silo-container';
        div.id = `card-${i}`;
        div.innerHTML = `
            <div class="gauge-wrapper">
                <div class="scan-ring"></div>
                <div class="main-ring" id="ring-${i}"></div>
                <div class="data-display">
                    <div class="val-num" id="val-${i}">0</div>
                    <div class="val-unit">TONS</div>
                </div>
            </div>
            <div class="silo-info">
                <h3>${s.name}</h3>
                <div style="opacity:0.5; font-size:12px; margin-top:5px;">CAPACITY: ${s.max} TN</div>
                <button class="btn-history" onclick="showHistory('${topic}')">ACCESS HISTORY</button>
            </div>
        `;
        grid.appendChild(div);
    });

    // MQTT
    const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");
    client.on("connect", () => {
        Object.keys(CONFIG).forEach(t => client.subscribe(t));
        console.log("HUD Online");
    });

    client.on("message", (topic, msg) => {
        const val = parseFloat(msg.toString());
        if (!isNaN(val)) updateHUD(topic, val);
    });

    function updateHUD(topic, val) {
        const keys = Object.keys(CONFIG);
        const i = keys.indexOf(topic);
        const s = CONFIG[topic];
        
        const perc = (val / s.max) * 100;
        const deg = Math.min(perc, 100) * 3.6;

        // Historial
        s.data.push({ x: new Date().toLocaleTimeString(), y: val });
        if (s.data.length > 30) s.data.shift();

        // Color según nivel
        let color = "var(--safe)";
        const card = document.getElementById(`card-${i}`);
        
        if (perc < 20) {
            color = "var(--danger)";
            card.classList.add('critical-glow');
        } else if (perc < 50) {
            color = "var(--warning)";
            card.classList.remove('critical-glow');
        } else {
            card.classList.remove('critical-glow');
        }

        document.getElementById(`ring-${i}`).style.background = `conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.05) ${deg}deg)`;
        document.getElementById(`val-${i}`).innerText = Math.round(val);
        document.getElementById(`val-${i}`).style.color = color;
    }

    function showHistory(topic) {
        const s = CONFIG[topic];
        document.getElementById('historyModal').style.display = 'flex';
        const ctx = document.getElementById('historyChart').getContext('2d');
        
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: s.data.map(d => d.x),
                datasets: [{
                    label: s.name,
                    data: s.data.map(d => d.y),
                    borderColor: '#00f0ff',
                    backgroundColor: 'rgba(0, 240, 255, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, max: s.max, grid: { color: 'rgba(255,255,255,0.1)' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { labels: { color: '#00f0ff', font: { family: 'Orbitron' } } } }
            }
        });
    }

    function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
</script>
</body>
</html>
